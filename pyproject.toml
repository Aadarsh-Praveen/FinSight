[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
markers = [
    "live: needs real network access -- live BigQuery, Vertex AI/Gemini, or MCP Toolbox; excluded via `-m 'not live'` (e.g. in CI, which has none of the three).",
]
